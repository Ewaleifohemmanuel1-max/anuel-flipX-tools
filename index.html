<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>FlipX Tools</title>
<meta name="theme-color" content="#14120F">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" href="./icon-192.png">
<style>
  :root{
    --paper:#F5F1E6;
    --card:#FBF9F2;
    --rule:#D8CFB4;
    --ink:#242018;
    --ink-soft:#6E664F;
    --brass:#8C6A2F;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:Georgia,'Iowan Old Style','Palatino Linotype','Times New Roman',serif;
    -webkit-font-smoothing:antialiased;
    padding:32px 16px 48px;
    min-height:100vh;
  }
  .wrap{max-width:480px;margin:0 auto;}
  header{text-align:center;margin-bottom:28px;border-bottom:2px solid var(--ink);padding-bottom:16px;}
  header h1{font-size:clamp(1.9rem,8vw,2.6rem);margin:0 0 4px;font-weight:400;letter-spacing:0.01em;}
  header .sub{margin:0;font-size:0.78rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);}

  .tool{
    display:flex;align-items:center;gap:16px;
    background:var(--card);border:1px solid var(--rule);border-radius:4px;
    padding:20px;margin-bottom:14px;text-decoration:none;color:var(--ink);
  }
  .tool:active{background:var(--ink);color:var(--paper);}
  .tool-icon{font-size:1.8rem;line-height:1;}
  .tool-text h2{margin:0 0 4px;font-size:1.15rem;font-weight:600;}
  .tool-text p{margin:0;font-size:0.85rem;color:var(--ink-soft);}
  .tool:active .tool-text p{color:var(--paper);opacity:0.75;}

  .soon{
    text-align:center;font-size:0.8rem;color:var(--ink-soft);
    margin-top:24px;font-style:italic;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>FlipX Tools</h1>
    <p class="sub">Trade ledger &amp; calculators</p>
  </header>

  <a class="tool" href="./risk-reward-calculator.html">
    <div class="tool-icon">📈</div>
    <div class="tool-text">
      <h2>Risk : Reward</h2>
      <p>Position size, R:R ratio, risk %</p>
    </div>
  </a>

  <a class="tool" href="./candle-pattern-validator.html">
    <div class="tool-icon">🕯</div>
    <div class="tool-text">
      <h2>Candle Ledger</h2>
      <p>Pin bar &amp; engulfing validation</p>
    </div>
  </a>

  <p class="soon">More tools coming soon.</p>
</div>
</body>
</html>
